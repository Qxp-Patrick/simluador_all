<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simulador de Investimentos</title>
    <script src="chart.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body { background-color: #f5f7fb; color: #333; padding: 15px; font-size: 14px; }
        .container { max-width: 600px; margin: 0 auto; }
        header { margin-bottom: 20px; text-align: center; padding: 10px 0; }
        h1 { color: #1e293b; font-size: 22px; font-weight: 700; }
        
        .actions-top { 
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px; 
        }
        
        .btn-add { 
            width: 100%;
            background-color: #10b981; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
            display: block;
            text-align: center;
        }
        .btn-add:active { background-color: #059669; }

        .btn-salvar-geral {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
            display: block;
            text-align: center;
        }
        .btn-salvar-geral:active { background-color: #1d4ed8; }
        
        .btn-delete { 
            background-color: #ef4444; 
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .ativo-card { 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            padding: 16px; 
            margin-bottom: 24px; 
            border-top: 6px solid #2563eb;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .ativo-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        .ativo-title { font-size: 16px; color: #1e293b; font-weight: 700; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; background-color: #fff; color: #1e293b; outline: none; }

        .taxa-dinamica-container { background-color: #f8fafc; padding: 12px; border-radius: 8px; border: 1px dashed #e2e8f0; display: flex; flex-direction: column; gap: 12px; }
        .ativo-results { background: #f0fdf4; padding: 14px; border-radius: 8px; border: 1px solid #bbf7d0; }
        .result-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
        .result-row span { font-weight: 600; }
        .result-total-box { margin-top: 10px; padding-top: 8px; border-top: 1px solid #bbf7d0; text-align: center; }
        .result-total-val { font-size: 22px; font-weight: 800; color: #15803d; }
        .chart-wrapper { position: relative; height: 200px; width: 100%; background: #fff; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Simulador de Investimentos</h1>
    </header>

    <div class="actions-top">
        <button type="button" class="btn-add" onclick="javascript:adicionarNovoAtivoDireto();">+ Adicionar Novo Ativo</button>
        <button type="button" class="btn-salvar-geral" onclick="javascript:salvarTodosCamposObterResultados();">💾 Recalcular e Salvar Dados</button>
    </div>

    <div id="lista-ativos"></div>
</div>

<script>
    var listaAtivos = [];
    var graficosArmazenados = {};

    // Carrega dados iniciais salvos
    try {
        var dadosLocais = localStorage.getItem('simulador_v5_estavel');
        if (dadosLocais) {
            listaAtivos = JSON.parse(dadosLocais);
        }
    } catch(err) {
        listaAtivos = [];
    }

    window.adicionarNovoAtivoDireto = function() {
        // Antes de adicionar um novo, salva o que já está digitado na tela para não perder nada
        salvarTodosCamposObterResultados(false);

        var idUnico = "id_" + new Date().getTime() + "_" + Math.floor(Math.random() * 1000);
        var novo = {
            id: idUnico,
            nome: 'Novo Ativo ' + (listaAtivos.length + 1),
            dataInclusao: new Date().toISOString().split('T')[0],
            valorInicial: 1000,
            tipoRegra: 'pre',
            taxaPre: 10.50,
            porcentagemCdi: 100,
            taxaSelicBase: 10.50,
            taxaIpcaBase: 4.50,
            taxaAdicional: 6.00
        };
        listaAtivos.push(novo);
        persistirNoBanco();
        desenharTela();
    };

    window.removerAtivoDireto = function(id) {
        if(confirm("Deseja remover este ativo?")) {
            listaAtivos = listaAtivos.filter(function(a) { return a.id !== id; });
            persistirNoBanco();
            desenharTela();
        }
    };

    window.mudarTipoRentabilidade = function(id, tipo) {
        var ativo = listaAtivos.find(function(a) { return a.id === id; });
        if (ativo) {
            ativo.tipoRegra = tipo;
            // Quando muda o tipo de regra, precisamos redesenhar os inputs de taxas na tela
            persistirNoBanco();
            desenharTela();
        }
    };

    function persistirNoBanco() {
        try {
            localStorage.setItem('simulador_v5_estavel', JSON.stringify(listaAtivos));
        } catch(e) {}
    }

    // ESSA FUNÇÃO ATUA APENAS QUANDO SOLICITADA (Evita travar o teclado do celular)
    window.salvarTodosCamposObterResultados = function(deveAvisar) {
        if (listaAtivos.length === 0) return;

        listaAtivos.forEach(function(ativo) {
            var inputNome = document.getElementById('inp-nome-' + ativo.id);
            var inputData = document.getElementById('inp-data-' + ativo.id);
            var inputValor = document.getElementById('inp-valor-' + ativo.id);

            if (inputNome) ativo.nome = inputNome.value;
            if (inputData) ativo.dataInclusao = inputData.value;
            if (inputValor) ativo.valorInicial = parseFloat(inputValor.value) || 0;

            // Captura as taxas dinâmicas baseadas no tipo de regra ativo
            if (ativo.tipoRegra === 'pre') {
                var tPre = document.getElementById('inp-tpre-' + ativo.id);
                if (tPre) ativo.taxaPre = parseFloat(tPre.value) || 0;
            } else if (ativo.tipoRegra === 'pos_cdi') {
                var tSelic = document.getElementById('inp-tselic-' + ativo.id);
                var pCdi = document.getElementById('inp-pcdi-' + ativo.id);
                if (tSelic) ativo.taxaSelicBase = parseFloat(tSelic.value) || 0;
                if (pCdi) ativo.porcentagemCdi = parseFloat(pCdi.value) || 0;
            } else if (ativo.tipoRegra === 'ipca_mais') {
                var tIpca = document.getElementById('inp-tipca-' + ativo.id);
                var tAdic = document.getElementById('inp-tadic-' + ativo.id);
                if (tIpca) ativo.taxaIpcaBase = parseFloat(tIpca.value) || 0;
                if (tAdic) ativo.taxaAdicional = parseFloat(tAdic.value) || 0;
            } else if (ativo.tipoRegra === 'selic_mais') {
                var tSelicM = document.getElementById('inp-tselicm-' + ativo.id);
                var tAdicM = document.getElementById('inp-tadicm-' + ativo.id);
                if (tSelicM) ativo.taxaSelicBase = parseFloat(tSelicM.value) || 0;
                if (tAdicM) ativo.taxaAdicional = parseFloat(tAdicM.value) || 0;
            }

            // Atualiza o texto do título do card em tempo real discretamente
            var txtTitulo = document.getElementById('txt-titulo-' + ativo.id);
            if (txtTitulo) txtTitulo.innerText = ativo.nome;

            // Recalcula os resultados matemáticos para este ativo específico
            recalcularValoresAtivo(ativo);
        });

        persistirNoBanco();

        if (deveAvisar !== false) {
            alert("Dados salvos e cálculos atualizados com sucesso!");
        }
    };

    function calcularMesesEntreDatas(inicio, fim) {
        var d1 = new Date(inicio);
        var d2 = new Date(fim);
        if (isNaN(d1.getTime()) || isNaN(d2.getTime())) return 0;
        var meses = (d2.getFullYear() - d1.getFullYear()) * 12;
        meses -= d1.getMonth();
        meses += d2.getMonth();
        return meses <= 0 ? 0 : meses;
    }

    function desenharTela() {
        var box = document.getElementById('lista-ativos');
        if (!box) return;
        box.innerHTML = '';

        if (listaAtivos.length === 0) {
            box.innerHTML = '<div style="text-align:center; color:#64748b; padding:40px 10px;">Nenhum ativo cadastrado. Toque no botão verde acima!</div>';
            return;
        }

        listaAtivos.forEach(function(ativo) {
            var card = document.createElement('div');
            card.className = 'ativo-card';

            var htmlTaxas = '';
            if (ativo.tipoRegra === 'pre') {
                htmlTaxas = '<div class="form-group"><label>Taxa Pré-Fixada Anual (%)</label><input type="number" step="0.01" id="inp-tpre-'+ativo.id+'" value="'+ativo.taxaPre+'"></div>';
            } else if (ativo.tipoRegra === 'pos_cdi') {
                htmlTaxas = '<div class="form-group"><label>Valor da SELIC/CDI Atual (%)</label><input type="number" step="0.01" id="inp-tselic-'+ativo.id+'" value="'+ativo.taxaSelicBase+'"></div>' +
                            '<div class="form-group"><label>% do CDI contratado</label><input type="number" step="1" id="inp-pcdi-'+ativo.id+'" value="'+ativo.porcentagemCdi+'"></div>';
            } else if (ativo.tipoRegra === 'ipca_mais') {
                htmlTaxas = '<div class="form-group"><label>IPCA Médio Estimado (%)</label><input type="number" step="0.01" id="inp-tipca-'+ativo.id+'" value="'+ativo.taxaIpcaBase+'"></div>' +
                            '<div class="form-group"><label>Taxa Fixa Adicional (+ %)</label><input type="number" step="0.01" id="inp-tadic-'+ativo.id+'" value="'+ativo.taxaAdicional+'"></div>';
            } else if (ativo.tipoRegra === 'selic_mais') {
                htmlTaxas = '<div class="form-group"><label>Taxa SELIC Base (%)</label><input type="number" step="0.01" id="inp-tselicm-'+ativo.id+'" value="'+ativo.taxaSelicBase+'"></div>' +
                            '<div class="form-group"><label>Taxa Fixa Adicional (+ %)</label><input type="number" step="0.01" id="inp-tadicm-'+ativo.id+'" value="'+ativo.taxaAdicional+'"></div>';
            }

            card.innerHTML = `
                <div class="ativo-header">
                    <span class="ativo-title" id="txt-titulo-${ativo.id}">${ativo.nome}</span>
                    <button type="button" class="btn-delete" onclick="removerAtivoDireto('${ativo.id}')">Excluir</button>
                </div>
                <div class="form-group">
                    <label>Nome do Ativo</label>
                    <input type="text" id="inp-nome-${ativo.id}" value="${ativo.nome}">
                </div>
                <div class="form-group">
                    <label>Data de Inclusão</label>
                    <input type="date" id="inp-data-${ativo.id}" value="${ativo.dataInclusao}">
                </div>
                <div class="form-group">
                    <label>Valor Inicial (R$)</label>
                    <input type="number" step="0.01" id="inp-valor-${ativo.id}" value="${ativo.valorInicial}">
                </div>
                <div class="form-group">
                    <label>Rentabilidade</label>
                    <select onchange="mudarTipoRentabilidade('${ativo.id}', this.value)">
                        <option value="pre" ${ativo.tipoRegra === 'pre' ? 'selected' : ''}>Pré-Fixado Puro</option>
                        <option value="pos_cdi" ${ativo.tipoRegra === 'pos_cdi' ? 'selected' : ''}>Pós-Fixado (% do CDI)</option>
                        <option value="ipca_mais" ${ativo.tipoRegra === 'ipca_mais' ? 'selected' : ''}>IPCA + Taxa Fixa</option>
                        <option value="selic_mais" ${ativo.tipoRegra === 'selic_mais' ? 'selected' : ''}>SELIC + Taxa Fixa</option>
                    </select>
                </div>
                <div class="taxa-dinamica-container">${htmlTaxas}</div>
                <div class="ativo-results" id="res-${ativo.id}"></div>
                <div class="chart-wrapper"><canvas id="canvas-linha-${ativo.id}"></canvas></div>
                <div class="chart-wrapper"><canvas id="canvas-pizza-${ativo.id}"></canvas></div>
            `;
            box.appendChild(card);
            recalcularValoresAtivo(ativo);
        });
    }

    function recalcularValoresAtivo(ativo) {
        var hoje = new Date().toISOString().split('T')[0];
        var meses = calcularMesesEntreDatas(ativo.dataInclusao, hoje);
        
        var taxaAnual = 0;
        if (ativo.tipoRegra === 'pre') taxaAnual = ativo.taxaPre;
        else if (ativo.tipoRegra === 'pos_cdi') taxaAnual = ativo.taxaSelicBase * (ativo.porcentagemCdi / 100);
        else if (ativo.tipoRegra === 'ipca_mais') taxaAnual = ((1 + (ativo.taxaIpcaBase / 100)) * (1 + (ativo.taxaAdicional / 100)) - 1) * 100;
        else if (ativo.tipoRegra === 'selic_mais') taxaAnual = ((1 + (ativo.taxaSelicBase / 100)) * (1 + (ativo.taxaAdicional / 100)) - 1) * 100;

        var taxaMensal = Math.pow(1 + (taxAnual / 100), 1 / 12) - 1;
        var dadosEvolucao = [];
        var labelsMeses = [];
        var acumulado = ativo.valorInicial;

        var limiteMeses = meses === 0 ? 1 : meses;

        for (var i = 0; i <= limiteMeses; i++) {
            if (i > 0 && meses > 0) acumulado = acumulado * (1 + taxaMensal);
            else if (i > 0 && meses === 0) acumulado = ativo.valorInicial * (1 + (taxaMensal / 30));
            dadosEvolucao.push(acumulado.toFixed(2));
            labelsMeses.push(meses === 0 ? (i === 0 ? 'Início' : 'Hoje') : 'Mês ' + i);
        }

        var rendimento = acumulado - ativo.valorInicial;
        var divRes = document.getElementById('res-' + ativo.id);
        if (divRes) {
            divRes.innerHTML = '<div class="result-row">Tempo decorrido: <span>'+meses+' meses</span></div>' +
                               '<div class="result-row">Taxa Base Anual: <span>'+taxaAnual.toFixed(2)+'% a.a.</span></div>' +
                               '<div class="result-row">Capital Inicial: <span>R$ '+ativo.valorInicial.toLocaleString('pt-BR', {minimumFractionDigits:2})+'</span></div>' +
                               '<div class="result-row">Rendimento Bruto: <span>R$ '+rendimento.toLocaleString('pt-BR', {minimumFractionDigits:2})+'</span></div>' +
                               '<div class="result-total-box"><div style="font-size:11px; color:#166534; font-weight:600;">VALOR AT
