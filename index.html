<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simulador de Investimentos</title>
    <script src="chart.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body { background-color: #f5f7fb; color: #333; padding: 15px; font-size: 14px; }
        .container { max-width: 600px; margin: 0 auto; }
        header { margin-bottom: 20px; text-align: center; padding: 10px 0; }
        h1 { color: #1e293b; font-size: 22px; font-weight: 700; }
        
        /* Área do Botão Principal */
        .actions-top { margin-bottom: 20px; }
        
        /* Botão estilizado para toque garantido em Mobile */
        .btn-add { 
            width: 100%;
            background-color: #10b981; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
            display: block;
            text-align: center;
            text-decoration: none;
            -webkit-appearance: none;
        }
        .btn-add:active { background-color: #059669; }
        
        .btn-delete { 
            background-color: #ef4444; 
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        /* Cards estilo Coluna */
        .ativo-card { 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            padding: 16px; 
            margin-bottom: 24px; 
            border-top: 6px solid #2563eb;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .ativo-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        .ativo-title { font-size: 16px; color: #1e293b; font-weight: 700; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; background-color: #fff; color: #1e293b; outline: none; }

        .taxa-dinamica-container { background-color: #f8fafc; padding: 12px; border-radius: 8px; border: 1px dashed #e2e8f0; display: flex; flex-direction: column; gap: 12px; }
        .ativo-results { background: #f0fdf4; padding: 14px; border-radius: 8px; border: 1px solid #bbf7d0; }
        .result-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
        .result-row span { font-weight: 600; }
        .result-total-box { margin-top: 10px; padding-top: 8px; border-top: 1px solid #bbf7d0; text-align: center; }
        .result-total-val { font-size: 22px; font-weight: 800; color: #15803d; }
        .chart-wrapper { position: relative; height: 200px; width: 100%; background: #fff; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Simulador de Investimentos</h1>
    </header>

    <div class="actions-top">
        <button type="button" class="btn-add" onclick="javascript:adicionarNovoAtivoDireto();">+ Adicionar Novo Ativo</button>
    </div>

    <div id="lista-ativos"></div>
</div>

<script>
    // Inicialização direta e simples
    var listaAtivos = [];
    var graficosArmazenados = {};

    // Tenta carregar dados de forma isolada
    try {
        var dadosLocais = localStorage.getItem('simulador_v4_mobile');
        if (dadosLocais) {
            listaAtivos = JSON.parse(dadosLocais);
        }
    } catch(err) {
        listaAtivos = [];
    }

    // Função global pura (escopo de janela), a forma mais compatível existente para mobile antigos e novos
    window.adicionarNovoAtivoDireto = function() {
        var idUnico = "id_" + new Date().getTime() + "_" + Math.floor(Math.random() * 1000);
        var novo = {
            id: idUnico,
            nome: 'Novo Ativo',
            dataInclusao: new Date().toISOString().split('T')[0],
            valorInicial: 1000,
            tipoRegra: 'pre',
            taxaPre: 10.50,
            porcentagemCdi: 100,
            taxaSelicBase: 10.50,
            taxaIpcaBase: 4.50,
            taxaAdicional: 6.00
        };
        listaAtivos.push(novo);
        salvarDadosEstado();
        desenharTela();
    };

    window.removerAtivoDireto = function(id) {
        if(confirm("Deseja remover este ativo?")) {
            listaAtivos = listaAtivos.filter(function(a) { return a.id !== id; });
            salvarDadosEstado();
            desenharTela();
        }
    };

    window.modificarAtivoDireto = function(id, campo, valor) {
        var ativo = listaAtivos.find(function(a) { return a.id === id; });
        if (ativo) {
            if (['valorInicial', 'taxaPre', 'porcentagemCdi', 'taxaSelicBase', 'taxaIpcaBase', 'taxaAdicional'].includes(campo)) {
                ativo[campo] = parseFloat(valor) || 0;
            } else {
                ativo[campo] = valor;
            }
            salvarDadosEstado();
            if (campo === 'tipoRegra') {
                desenharTela();
            } else {
                recalcularValoresAtivo(ativo);
            }
        }
    };

    function salvarDadosEstado() {
        try {
            localStorage.setItem('simulador_v4_mobile', JSON.stringify(listaAtivos));
        } catch(e) {}
    }

    function calcularMesesEntreDatas(inicio, fim) {
        var d1 = new Date(inicio);
        var d2 = new Date(fim);
        if (isNaN(d1.getTime()) || isNaN(d2.getTime())) return 0;
        var meses = (d2.getFullYear() - d1.getFullYear()) * 12;
        meses -= d1.getMonth();
        meses += d2.getMonth();
        return meses <= 0 ? 0 : meses;
    }

    function desenharTela() {
        var box = document.getElementById('lista-ativos');
        if (!box) return;
        box.innerHTML = '';

        if (listaAtivos.length === 0) {
            box.innerHTML = '<div style="text-align:center; color:#64748b; padding:40px 10px;">Nenhum ativo cadastrado. Toque no botão verde acima!</div>';
            return;
        }

        listaAtivos.forEach(function(ativo) {
            var card = document.createElement('div');
            card.className = 'ativo-card';

            var htmlTaxas = '';
            if (ativo.tipoRegra === 'pre') {
                htmlTaxas = '<div class="form-group"><label>Taxa Pré-Fixada Anual (%)</label><input type="number" step="0.01" value="'+ativo.taxaPre+'" oninput="modificarAtivoDireto(\''+ativo.id+'\', \'taxaPre\', this.value)"></div>';
            } else if (ativo.tipoRegra === 'pos_cdi') {
                htmlTaxas = '<div class="form-group"><label>Valor da SELIC/CDI Atual (%)</label><input type="number" step="0.01" value="'+ativo.taxaSelicBase+'" oninput="modificarAtivoDireto(\''+ativo.id+'\', \'taxaSelicBase\', this.value)"></div>' +
                            '<div class="form-group"><label>% do CDI contratado</label><input type="number" step="1" value="'+ativo.porcentagemCdi+'" oninput="modificarAtivoDireto(\''+ativo.id+'\', \'porcentagemCdi\', this.value)"></div>';
            } else if (ativo.tipoRegra === 'ipca_mais') {
                htmlTaxas = '<div class="form-group"><label>IPCA Médio Estimado (%)</label><input type="number" step="0.01" value="'+ativo.taxaIpcaBase+'" oninput="modificarAtivoDireto(\''+ativo.id+'\', \'taxaIpcaBase\', this.value)"></div>' +
                            '<div class="form-group"><label>Taxa Fixa Adicional (+ %)</label><input type="number" step="0.01" value="'+ativo.taxaAdicional+'" oninput="modificarAtivoDireto(\''+ativo.id+'\', \'taxaAdicional\', this.value)"></div>';
            } else if (ativo.tipoRegra === 'selic_mais') {
                htmlTaxas = '<div class="form-group"><label>Taxa SELIC Base (%)</label><input type="number" step="0.01" value="'+ativo.taxaSelicBase+'" oninput="modificarAtivoDireto(\''+ativo.id+'\', \'taxaSelicBase\', this.value)"></div>' +
                            '<div class="form-group"><label>Taxa Fixa Adicional (+ %)</label><input type="number" step="0.01" value="'+ativo.taxaAdicional+'" oninput="modificarAtivoDireto(\''+ativo.id+'\', \'taxaAdicional\', this.value)"></div>';
            }

            card.innerHTML = `
                <div class="ativo-header">
                    <span class="ativo-title" id="txt-titulo-${ativo.id}">${ativo.nome}</span>
                    <button type="button" class="btn-delete" onclick="removerAtivoDireto('${ativo.id}')">Excluir</button>
                </div>
                <div class="form-group">
                    <label>Nome do Ativo</label>
                    <input type="text" value="${ativo.nome}" oninput="document.getElementById('txt-titulo-${ativo.id}').innerText = this.value; modificarAtivoDireto('${ativo.id}', 'nome', this.value)">
                </div>
                <div class="form-group">
                    <label>Data de Inclusão</label>
                    <input type="date" value="${ativo.dataInclusao}" onchange="modificarAtivoDireto('${ativo.id}', 'dataInclusao', this.value)">
                </div>
                <div class="form-group">
                    <label>Valor Inicial (R$)</label>
                    <input type="number" step="0.01" value="${ativo.valorInicial}" oninput="modificarAtivoDireto('${ativo.id}', 'valorInicial', this.value)">
                </div>
                <div class="form-group">
                    <label>Rentabilidade</label>
                    <select onchange="modificarAtivoDireto('${ativo.id}', 'tipoRegra', this.value)">
                        <option value="pre" ${ativo.tipoRegra === 'pre' ? 'selected' : ''}>Pré-Fixado Puro</option>
                        <option value="pos_cdi" ${ativo.tipoRegra === 'pos_cdi' ? 'selected' : ''}>Pós-Fixado (% do CDI)</option>
                        <option value="ipca_mais" ${ativo.tipoRegra === 'ipca_mais' ? 'selected' : ''}>IPCA + Taxa Fixa</option>
                        <option value="selic_mais" ${ativo.tipoRegra === 'selic_mais' ? 'selected' : ''}>SELIC + Taxa Fixa</option>
                    </select>
                </div>
                <div class="taxa-dinamica-container">${htmlTaxas}</div>
                <div class="ativo-results" id="res-${ativo.id}"></div>
                <div class="chart-wrapper"><canvas id="canvas-linha-${ativo.id}"></canvas></div>
                <div class="chart-wrapper"><canvas id="canvas-pizza-${ativo.id}"></canvas></div>
            `;
            box.appendChild(card);
            recalcularValoresAtivo(ativo);
        });
    }

    function recalcularValoresAtivo(ativo) {
        var hoje = new Date().toISOString().split('T')[0];
        var meses = calcularMesesEntreDatas(ativo.dataInclusao, hoje);
        
        var taxaAnual = 0;
        if (ativo.tipoRegra === 'pre') taxaAnual = ativo.taxaPre;
        else if (ativo.tipoRegra === 'pos_cdi') taxaAnual = ativo.taxaSelicBase * (ativo.porcentagemCdi / 100);
        else if (ativo.tipoRegra === 'ipca_mais') taxaAnual = ((1 + (ativo.taxaIpcaBase / 100)) * (1 + (ativo.taxaAdicional / 100)) - 1) * 100;
        else if (ativo.tipoRegra === 'selic_mais') taxaAnual = ((1 + (ativo.taxaSelicBase / 100)) * (1 + (ativo.taxaAdicional / 100)) - 1) * 100;

        var taxaMensal = Math.pow(1 + (taxAnual / 100), 1 / 12) - 1;
        var dadosEvolucao = [];
        var labelsMeses = [];
        var acumulado = ativo.valorInicial;

        var limiteMeses = meses === 0 ? 1 : meses;

        for (var i = 0; i <= limiteMeses; i++) {
            if (i > 0 && meses > 0) acumulado = acumulado * (1 + taxaMensal);
            else if (i > 0 && meses === 0) acumulado = ativo.valorInicial * (1 + (taxaMensal / 30));
            dadosEvolucao.push(acumulado.toFixed(2));
            labelsMeses.push(meses === 0 ? (i === 0 ? 'Início' : 'Hoje') : 'Mês ' + i);
        }

        var rendimento = acumulado - ativo.valorInicial;
        var divRes = document.getElementById('res-' + ativo.id);
        if (divRes) {
            divRes.innerHTML = '<div class="result-row">Tempo decorrido: <span>'+meses+' meses</span></div>' +
                               '<div class="result-row">Taxa Base Anual: <span>'+taxaAnual.toFixed(2)+'% a.a.</span></div>' +
                               '<div class="result-row">Capital Inicial: <span>R$ '+ativo.valorInicial.toLocaleString('pt-BR', {minimumFractionDigits:2})+'</span></div>' +
                               '<div class="result-row">Rendimento Bruto: <span>R$ '+rendimento.toLocaleString('pt-BR', {minimumFractionDigits:2})+'</span></div>' +
                               '<div class="result-total-box"><div style="font-size:11px; color:#166534; font-weight:600;">VALOR ATUAL ESTIMADO</div><div class="result-total-val">R$ '+acumulado.toLocaleString('pt-BR', {minimumFractionDigits:2})+'</div></div>';
        }

        renderizarGraficosSeguros(ativo.id, labelsMeses, dadosEvolucao, ativo.valorInicial, rendimento);
    }

    function renderizarGraficosSeguros(id, labels, dadosLinha, valorInicial, rendimento) {
        // Verifica se a biblioteca Chart existe antes de tentar desenhar (evita crash silencioso em mobile)
        if (typeof Chart === 'undefined') return;

        var cLinha = document.getElementById('canvas-linha-' + id);
        var cPizza = document.getElementById('canvas-pizza-' + id);
        if (!cLinha || !cPizza) return;

        if (graficosArmazenados['l_' + id]) { try { graficosArmazenados['l_' + id].destroy(); } catch(e){} }
        if (graficosArmazenados['p_' + id]) { try { graficosArmazenados['p_' + id].destroy(); } catch(e){} }

        try {
            graficosArmazenados['l_' + id] = new Chart(cLinha, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ data: dadosLinha, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.05)', fill: true, tension: 0.1, borderWidth: 2 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            graficosArmazenados['p_' + id] = new Chart(cPizza, {
                type: 'pie',
                data: {
                    labels: ['Inicial', 'Rendimentos'],
                    datasets: [{ data: [valorInicial.toFixed(2), rendimento > 0 ? rendimento.toFixed(2) : 0.01], backgroundColor: ['#475569', '#10b981'] }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        } catch(err) {
            console.log("Erro gráfico omitido para estabilidade mobile");
        }
    }

    // Executa o desenho inicial da tela
    desenharTela();
</script>

</body>
</html>
