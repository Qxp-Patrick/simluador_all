<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador de Investimentos Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-color: #f5f7fb; 
            color: #333; 
            padding: 15px;
            font-size: 14px;
        }

        .container { 
            max-width: 600px; 
            margin: 0 auto; 
        }

        header { 
            margin-bottom: 20px; 
            text-align: center;
            padding: 10px 0;
        }
        
        h1 { 
            color: #1e293b; 
            font-size: 22px;
            font-weight: 700;
        }

        .actions-top {
            margin-bottom: 20px;
        }

        /* Botão Grande Otimizado com área de toque expandida para Mobile */
        .btn-add { 
            width: 100%;
            background-color: #10b981; 
            color: white; 
            border: none; 
            padding: 16px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
            transition: background 0.2s;
            display: block;
            text-align: center;
        }
        .btn-add:active {
            background-color: #059669;
        }
        
        .btn-delete { 
            background-color: #ef4444; 
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Card de cada Ativo */
        .ativo-card { 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            padding: 16px; 
            margin-bottom: 24px; 
            border-top: 6px solid #2563eb;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .ativo-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #f1f5f9; 
            padding-bottom: 10px; 
        }
        
        .ativo-title {
            font-size: 16px; 
            color: #1e293b;
            font-weight: 700;
        }

        .form-group { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }
        
        .form-group label { 
            font-size: 11px; 
            font-weight: 600; 
            color: #64748b; 
            text-transform: uppercase;
        }
        
        input, select { 
            width: 100%;
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            font-size: 15px; 
            background-color: #fff;
            color: #1e293b;
            outline: none;
            -webkit-appearance: none;
        }

        .taxa-dinamica-container {
            background-color: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ativo-results { 
            background: #f0fdf4; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #bbf7d0;
        }
        
        .result-row { 
            display: flex;
            justify-content: space-between;
            font-size: 14px; 
            margin-bottom: 6px; 
        }
        .result-row span { font-weight: 600; }
        
        .result-total-box {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #bbf7d0;
            text-align: center;
        }
        .result-total-val {
            font-size: 22px; 
            font-weight: 800;
            color: #15803d; 
        }
        
        .ativo-charts { 
            display: flex; 
            flex-direction: column;
            gap: 20px; 
        }
        
        .chart-wrapper { 
            position: relative; 
            height: 200px; 
            width: 100%; 
            background: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Simulador de Investimentos</h1>
    </header>

    <div class="actions-top">
        <button class="btn-add" onclick="adicionarAtivo()">+ Adicionar Novo Ativo</button>
    </div>

    <div id="lista-ativos"></div>
</div>

<script>
    let listaAtivos = [];
    let instanciasGraficos = {};

    // Força o carregamento seguro do LocalStorage limpando potenciais dados corrompidos de versões anteriores
    try {
        const dadosSalvos = localStorage.getItem('simulador_ativos_v3');
        if (dadosSalvos) {
            listaAtivos = JSON.parse(dadosSalvos);
        }
    } catch (e) {
        console.error("Erro ao ler localStorage", e);
        listaAtivos = [];
    }

    function adicionarAtivo() {
        const novoAtivo = {
            id: "id_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
            nome: 'Novo Ativo',
            dataInclusao: new Date().toISOString().split('T')[0],
            valorInicial: 1000,
            tipoRegra: 'pre', 
            taxaPre: 10.50,   
            porcentagemCdi: 100, 
            taxaSelicBase: 10.50, 
            taxaIpcaBase: 4.50,   
            taxaAdicional: 6.00   
        };
        listaAtivos.push(novoAtivo);
        salvarDados();
        renderizarAtivos();
    }

    function deletarAtivo(id) {
        if(confirm("Deseja remover este ativo?")) {
            listaAtivos = listaAtivos.filter(a => a.id !== id);
            salvarDados();
            renderizarAtivos();
        }
    }

    function atualizarAtivo(id, campo, valor) {
        const ativo = listaAtivos.find(a => a.id === id);
        if (ativo) {
            if (['valorInicial', 'taxaPre', 'porcentagemCdi', 'taxaSelicBase', 'taxaIpcaBase', 'taxaAdicional'].includes(campo)) {
                ativo[campo] = parseFloat(valor) || 0;
            } else {
                ativo[campo] = valor;
            }
            salvarDados();
            
            if (campo === 'tipoRegra') {
                renderizarAtivos();
            } else {
                calcularResultadosAtivo(ativo);
            }
        }
    }

    function salvarDados() {
        try {
            localStorage.setItem('simulador_ativos_v3', JSON.stringify(listaAtivos));
        } catch (e) {
            console.error("Erro ao salvar dados", e);
        }
    }

    function diferencaEmMeses(dataInicio, dataFim) {
        const d1 = new Date(dataInicio);
        const d2 = new Date(dataFim);
        if (isNaN(d1.getTime()) || isNaN(d2.getTime())) return 0;
        let meses = (d2.getFullYear() - d1.getFullYear()) * 12;
        meses -= d1.getMonth();
        meses += d2.getMonth();
        return meses <= 0 ? 0 : meses;
    }

    function renderizarAtivos() {
        const container = document.getElementById('lista-ativos');
        if (!container) return;
        container.innerHTML = '';

        if(listaAtivos.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:#64748b; padding:40px 10px;">Nenhum ativo cadastrado. Clique acima para começar!</div>`;
            return;
        }

        listaAtivos.forEach(ativo => {
            const card = document.createElement('div');
            card.className = 'ativo-card';
            
            let htmlInputsTaxa = '';
            if (ativo.tipoRegra === 'pre') {
                htmlInputsTaxa = `
                    <div class="form-group">
                        <label>Taxa Pré-Fixada Anual (%)</label>
                        <input type="number" step="0.01" value="${ativo.taxaPre}" oninput="atualizarAtivo('${ativo.id}', 'taxaPre', this.value)">
                    </div>
                `;
            } else if (ativo.tipoRegra === 'pos_cdi') {
                htmlInputsTaxa = `
                    <div class="form-group">
                        <label>Valor da SELIC/CDI Atual (%)</label>
                        <input type="number" step="0.01" value="${ativo.taxaSelicBase}" oninput="atualizarAtivo('${ativo.id}', 'taxaSelicBase', this.value)">
                    </div>
                    <div class="form-group">
                        <label>% do CDI contratado</label>
                        <input type="number" step="1" value="${ativo.porcentagemCdi}" oninput="atualizarAtivo('${ativo.id}', 'porcentagemCdi', this.value)">
                    </div>
                `;
            } else if (ativo.tipoRegra === 'ipca_mais') {
                htmlInputsTaxa = `
                    <div class="form-group">
                        <label>IPCA Médio Estimado (%)</label>
                        <input type="number" step="0.01" value="${ativo.taxaIpcaBase}" oninput="atualizarAtivo('${ativo.id}', 'taxaIpcaBase', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Taxa Fixa Adicional (+ %)</label>
                        <input type="number" step="0.01" value="${ativo.taxaAdicional}" oninput="atualizarAtivo('${ativo.id}', 'taxaAdicional', this.value)">
                    </div>
                `;
            } else if (ativo.tipoRegra === 'selic_mais') {
                htmlInputsTaxa = `
                    <div class="form-group">
                        <label>Taxa SELIC Base (%)</label>
                        <input type="number" step="0.01" value="${ativo.taxaSelicBase}" oninput="atualizarAtivo('${ativo.id}', 'taxaSelicBase', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Taxa Fixa Adicional (+ %)</label>
                        <input type="number" step="0.01" value="${ativo.taxaAdicional}" oninput="atualizarAtivo('${ativo.id}', 'taxaAdicional', this.value)">
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="ativo-header">
                    <span class="ativo-title" id="title-text-${ativo.id}">${ativo.nome}</span>
                    <button class="btn-delete" onclick="deletarAtivo('${ativo.id}')">Excluir</button>
                </div>

                <div class="form-group">
                    <label>Nome do Ativo</label>
                    <input type="text" value="${ativo.nome}" oninput="document.getElementById('title-text-${
